name: jolyne-dev

# Stack de dev : pas de Caddy, ports backend/redis exposés en local.
# Le frontend tourne hors compose via `pnpm dev` pour profiter du HMR.
#
# Usage : docker compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ../backend
    environment:
      JOLYNE_ENV: dev
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      POSTGRES_DSN: postgres://jolyne:jolyne@postgres:5432/jolyne?sslmode=disable
      POSTGRES_AUTO_MIGRATE: "true"
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # On ne bloque pas le boot backend sur la santé de LibreTranslate :
      # 1er boot = téléchargement des modèles Argos (plusieurs minutes).
      libretranslate:
        condition: service_started
      languagetool:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jolyne
      POSTGRES_PASSWORD: jolyne
      POSTGRES_DB: jolyne
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jolyne"]
      interval: 5s
      timeout: 3s
      retries: 5

  # LibreTranslate : self-host (PLAN.md §8 décisions). Premier boot lent
  # (plusieurs minutes) car téléchargement des modèles FR/EN/ES/DE.
  # Pas de volume persistant : volume nommé = root-owned, LT tourne en UID
  # 1032 → PermissionError. Modèles re-téléchargés à chaque container create.
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr,es,de"
      LT_DISABLE_WEB_UI: "true"
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/languages\", timeout=3).getcode()==200 else sys.exit(1)' || exit 1"
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s

  # LanguageTool : self-host pour la correction grammaticale.
  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"

volumes:
  redis_dev_data:
  postgres_dev_data:
