name: jolyne-dev

# Stack de dev : pas de Caddy, ports backend/redis exposés en local.
# Le frontend tourne hors compose via `pnpm dev` pour profiter du HMR.
#
# Usage : docker compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ../backend
    environment:
      JOLYNE_ENV: dev
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      POSTGRES_DSN: postgres://jolyne:jolyne@postgres:5432/jolyne?sslmode=disable
      POSTGRES_AUTO_MIGRATE: "true"
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
      languagetool:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jolyne
      POSTGRES_PASSWORD: jolyne
      POSTGRES_DB: jolyne
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jolyne"]
      interval: 5s
      timeout: 3s
      retries: 5

  # LibreTranslate : self-host (PLAN.md §8 décisions). Premier boot lent
  # (~2min) car téléchargement des modèles FR/EN/ES/DE.
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr,es,de"
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/languages || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  # LanguageTool : self-host pour la correction grammaticale.
  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"

volumes:
  redis_dev_data:
  postgres_dev_data:
  libretranslate_models:
