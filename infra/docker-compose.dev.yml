name: jolyne-dev

# Stack de dev : pas de reverse proxy, ports backend/redis exposés en local.
# Le frontend tourne hors compose via `pnpm dev` pour profiter du HMR.
#
# Usage : docker compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ../backend
    environment:
      JOLYNE_ENV: dev
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      POSTGRES_DSN: postgres://jolyne:jolyne@postgres:5432/jolyne?sslmode=disable
      POSTGRES_AUTO_MIGRATE: "true"
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
      FACE_MATCHER_URL: http://face-matcher:5001
      # Scorer de toxicité local (Detoxify) — même cascade qu'en prod. Sans
      # lui, la zone grise part directement à Claude (coût + étage intestable).
      TOXICITY_SCORER_URL: http://toxicity-scorer:5002
      # Auth utilisateur (dev). Secret de dev figé, ne pas réutiliser en prod.
      USER_SESSION_SECRET: "ZGV2X3VzZXJfc2Vzc2lvbl9zZWNyZXRfMzJfYnl0ZXNfbWluX2RldnQK"
      USER_COOKIE_DOMAIN: ""
      PUBLIC_APP_URL: "http://localhost:3000"
      # Mailjet : vide en dev → le backend log les liens de vérification /
      # reset sur stdout à la place d'envoyer un email.
      MAILJET_API_KEY: ""
      MAILJET_SECRET_KEY: ""
      MAILJET_FROM: ""
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # On ne bloque pas le boot backend sur la santé de LibreTranslate :
      # 1er boot = téléchargement des modèles Argos (plusieurs minutes).
      libretranslate:
        condition: service_started
      languagetool:
        condition: service_started
      face-matcher:
        condition: service_started
      # Chargement du modèle Detoxify ~30 s — on n'attend pas (la cascade
      # dégrade sur Claude entre-temps), comme en prod.
      toxicity-scorer:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jolyne
      POSTGRES_PASSWORD: jolyne
      POSTGRES_DB: jolyne
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jolyne"]
      interval: 5s
      timeout: 3s
      retries: 5

  # LibreTranslate : self-host. Premier boot lent (plusieurs minutes) car
  # téléchargement des modèles des 10 langues — persistés ensuite dans un
  # volume nommé monté sur ~/.local ENTIER (même schéma que la prod : ce
  # chemin existe dans l'image avec le bon owner UID 1032, un montage plus
  # profond serait créé root-owned → PermissionError).
  # LT_LOAD_ONLY couvre toutes les langues de l'app (sinon ar/pt/it/zh/ja/ko
  # échouent) ; Argos pivote par l'anglais → garder `en`.
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr,es,de,pt,it,zh,ja,ko,ar"
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - libretranslate_dev_models:/home/libretranslate/.local
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/languages\", timeout=3).getcode()==200 else sys.exit(1)' || exit 1"
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s

  # LanguageTool : self-host pour la correction grammaticale.
  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"

  face-matcher:
    build:
      context: ../infra/face-matcher
    restart: unless-stopped
    environment:
      PORT: 5001

  # Scorer de toxicité (Detoxify multilingue, CPU) — même image qu'en prod,
  # les poids (~1 Go) sont dans l'image, pas de téléchargement au boot.
  toxicity-scorer:
    build:
      context: ../infra/toxicity-scorer
    restart: unless-stopped
    environment:
      PORT: 5002

volumes:
  redis_dev_data:
  postgres_dev_data:
  libretranslate_dev_models:
