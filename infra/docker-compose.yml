name: jolyne

# Stack de prod (un seul VPS). Voir docker-compose.dev.yml pour le dev local.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      JOLYNE_DOMAIN: ${JOLYNE_DOMAIN:?JOLYNE_DOMAIN requis}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      JOLYNE_ENV: prod
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
      FACE_MATCHER_URL: http://face-matcher:5001
      PUBLIC_CORS_ORIGIN: https://${JOLYNE_DOMAIN}
    depends_on:
      redis:
        condition: service_healthy
      # cf. docker-compose.yml racine — on ne bloque pas le boot backend sur
      # la santé de LibreTranslate (téléchargement modèles long au 1er boot).
      libretranslate:
        condition: service_started
      languagetool:
        condition: service_started
      face-matcher:
        condition: service_started

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_HTTP_URL: https://${JOLYNE_DOMAIN}
      NEXT_PUBLIC_BACKEND_WS_URL: wss://${JOLYNE_DOMAIN}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "900 1", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Pas de volume persistant — cf. commentaire dans docker-compose.yml racine
  # (UID 1032 vs volume root-owned). Modèles re-téléchargés à chaque "up".
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      # Toutes les langues de l'app (sinon les paires ar/pt/it/zh/ja/ko
      # échouent). Argos pivote par l'anglais → garder `en`.
      LT_LOAD_ONLY: "en,fr,es,de,pt,it,zh,ja,ko,ar"
      LT_DISABLE_WEB_UI: "true"
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/languages\", timeout=3).getcode()==200 else sys.exit(1)' || exit 1"
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s

  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"

  face-matcher:
    build:
      context: ../infra/face-matcher
    restart: unless-stopped
    environment:
      PORT: 5001

volumes:
  caddy_data:
  caddy_config:
  redis_data:
