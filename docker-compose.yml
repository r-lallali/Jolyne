# Compose à utiliser quand Jolyne est déployé via Dokploy.
# - Pas de Caddy : Dokploy fournit Traefik avec Let's Encrypt automatique.
# - Le réseau `dokploy-network` est créé par Dokploy.
# - Routage par sous-domaines (séparation propre, pas de PathPrefix) :
#     ${JOLYNE_DOMAIN}      → frontend
#     api.${JOLYNE_DOMAIN}  → backend (WS + API + healthz)

name: jolyne

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JOLYNE_ENV: prod
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.jolyne-backend.rule=Host(`api.${JOLYNE_DOMAIN}`)
      - traefik.http.routers.jolyne-backend.entrypoints=websecure
      - traefik.http.routers.jolyne-backend.tls.certresolver=letsencrypt
      - traefik.http.routers.jolyne-backend.middlewares=jolyne-headers@docker
      - traefik.http.services.jolyne-backend.loadbalancer.server.port=8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* doit être baked au build (pas runtime). Le backend
      # est désormais joint via le sous-domaine api.{domaine}.
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: https://api.${JOLYNE_DOMAIN}
        NEXT_PUBLIC_BACKEND_WS_URL: wss://api.${JOLYNE_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.jolyne-frontend.rule=Host(`${JOLYNE_DOMAIN}`)
      - traefik.http.routers.jolyne-frontend.entrypoints=websecure
      - traefik.http.routers.jolyne-frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.jolyne-frontend.middlewares=jolyne-headers@docker
      - traefik.http.services.jolyne-frontend.loadbalancer.server.port=3000
      # Middleware partagé : headers de sécurité (mêmes valeurs que celles
      # qu'imposait Caddy — voir CLAUDE.md §Sécurité).
      - traefik.http.middlewares.jolyne-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.jolyne-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.jolyne-headers.headers.frameDeny=true
      - traefik.http.middlewares.jolyne-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.jolyne-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.jolyne-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      - traefik.http.middlewares.jolyne-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.${JOLYNE_DOMAIN} wss://api.${JOLYNE_DOMAIN}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "900 1",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  redis_data:
