# Compose minimal pour Dokploy.
# Pas de labels Traefik : la config domain/port se fait via l'UI Dokploy
# (Service → Domains), Dokploy ajoute lui-même les bons labels en sachant
# comment son Traefik est branché.
#
# À configurer dans l'UI :
#   frontend → jolyne.ralys.ovh       → container port 3000
#   backend  → api.jolyne.ralys.ovh   → container port 8080

name: jolyne

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JOLYNE_ENV: prod
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      # Postgres (Phase 2+). Renseigne dans Dokploy → Environment Variables.
      # Le DSN doit pointer vers le service Postgres interne (dokploy-network).
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      POSTGRES_AUTO_MIGRATE: ${POSTGRES_AUTO_MIGRATE:-false}
      # Clé AES-256 base64 (32 octets) pour chiffrer les messages capturés
      # lors d'un signalement. Génération : openssl rand -base64 32.
      REPORT_ENCRYPTION_KEY: ${REPORT_ENCRYPTION_KEY:-}
      # Back-office admin (Phase 2). Renseigne dans Dokploy → Env Variables.
      ADMIN_USERS: ${ADMIN_USERS:-}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN:-}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-}
      # Frontend public (chat) — CORS pour /api/translate et /api/grammar.
      PUBLIC_CORS_ORIGIN: ${PUBLIC_CORS_ORIGIN:-}
      # Self-host LibreTranslate + LanguageTool sur le même réseau.
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
    depends_on:
      redis:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
      languagetool:
        condition: service_started
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: https://api.${JOLYNE_DOMAIN}
        NEXT_PUBLIC_BACKEND_WS_URL: wss://api.${JOLYNE_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "900 1",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dokploy-network

  # LibreTranslate self-host (PLAN.md §8 — décision actée). Premier boot lent
  # (~2 min) car téléchargement des modèles. Volume monté pour persister.
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr,es,de"
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - libretranslate_models:/home/libretranslate/.local/share/argos-translate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/languages || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - dokploy-network

  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  redis_data:
  libretranslate_models:
