# Compose minimal pour Dokploy.
# Pas de labels Traefik : la config domain/port se fait via l'UI Dokploy
# (Service → Domains), Dokploy ajoute lui-même les bons labels en sachant
# comment son Traefik est branché.
#
# À configurer dans l'UI :
#   frontend → jolyne.ralys.ovh       → container port 3000
#   backend  → api.jolyne.ralys.ovh   → container port 8080

name: jolyne

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # SHA + version pour traçabilité au boot. Pose `BUILD_COMMIT` côté
        # Dokploy (ex: `git rev-parse --short HEAD`) sinon le binaire log
        # "dev" — signal qu'il faut taguer la build.
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_VERSION: ${BUILD_VERSION:-dev}
    restart: unless-stopped
    environment:
      JOLYNE_ENV: ${JOLYNE_ENV:-prod}
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      # Postgres (Phase 2+). Renseigne dans Dokploy → Environment Variables.
      # Le DSN doit pointer vers le service Postgres interne (dokploy-network).
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      POSTGRES_AUTO_MIGRATE: ${POSTGRES_AUTO_MIGRATE:-true}
      FACE_MATCHER_URL: http://face-matcher:5001
      # Clé AES-256 base64 (32 octets) pour chiffrer les messages capturés
      # lors d'un signalement. Génération : openssl rand -base64 32.
      REPORT_ENCRYPTION_KEY: ${REPORT_ENCRYPTION_KEY:-}
      # Back-office admin (Phase 2). Renseigne dans Dokploy → Env Variables.
      ADMIN_USERS: ${ADMIN_USERS:-}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN:-}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-}
      # Frontend public (chat) — CORS pour /api/translate et /api/grammar.
      # Default sur https://${JOLYNE_DOMAIN} (l'origin du frontend) ; override
      # si tu sers le chat depuis un autre host.
      PUBLIC_CORS_ORIGIN: ${PUBLIC_CORS_ORIGIN:-https://${JOLYNE_DOMAIN}}
      # Self-host LibreTranslate + LanguageTool sur le même réseau.
      LIBRETRANSLATE_URL: http://libretranslate:5000
      LANGUAGETOOL_URL: http://languagetool:8010
      # Auth utilisateur magic link. Base64 ≥32 octets via openssl rand -base64 32.
      USER_SESSION_SECRET: ${USER_SESSION_SECRET:-}
      USER_COOKIE_DOMAIN: ${USER_COOKIE_DOMAIN:-${ADMIN_COOKIE_DOMAIN:-}}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://${JOLYNE_DOMAIN}}
      # Mailjet SMTP (in-v3.mailjet.com:587). API_KEY + SECRET_KEY = SMTP user/pass.
      MAILJET_API_KEY: ${MAILJET_API_KEY:-}
      MAILJET_SECRET_KEY: ${MAILJET_SECRET_KEY:-}
      MAILJET_FROM: ${MAILJET_FROM:-}
      # Cloudinary (photos profil). Dashboard → Account Details.
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-jolyne/avatars}
      # Web Push (VAPID). Générer une fois via `npx web-push generate-vapid-keys`
      # puis poser les 3 vars dans Dokploy → Environment.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # Bot prof IA (Claude). Vide → bot désactivé (prof IA "ne se lance pas").
      # Default model claude-haiku-4-5-20251001 (ID canonique avec date) pour
      # coût/latence ; ~$0.002 par réponse. Doit rester aligné sur le default Go
      # (config.go) : un alias/modèle inconnu fait échouer TOUS les appels en 404
      # → prof IA muet / réponses de repli.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      BOT_MAX_CONCURRENT: ${BOT_MAX_CONCURRENT:-20}
      BOT_TRIGGER_DELAY_SEC: ${BOT_TRIGGER_DELAY_SEC:-10}
      # Stripe (abonnement Premium). Vide → /api/billing/* renvoie 503.
      # Renseigne SECRET_KEY + PRICE_ID + WEBHOOK_SECRET dans Dokploy → Env.
      # Success/Cancel/Return dérivées de PUBLIC_APP_URL si non posées.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-}
    depends_on:
      redis:
        condition: service_healthy
      # LibreTranslate met plusieurs minutes à télécharger ses modèles au
      # premier boot — on n'attend pas qu'il soit healthy pour démarrer le
      # backend (les appels /api/translate renverront 502 entre-temps).
      libretranslate:
        condition: service_started
      languagetool:
        condition: service_started
      face-matcher:
        condition: service_started
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: https://api.${JOLYNE_DOMAIN}
        NEXT_PUBLIC_BACKEND_WS_URL: wss://api.${JOLYNE_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "900 1",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dokploy-network

  # LibreTranslate self-host (PLAN.md §8 — décision actée).
  # LT_LOAD_ONLY doit couvrir TOUTES les langues proposées par l'app (cf.
  # frontend ALL_LANGS / handler translate allowedLangs) : sinon toute paire
  # touchant une langue absente échoue (« ar is not supported »). Argos pivote
  # par l'anglais, donc `en` reste indispensable dans la liste.
  # Pas de volume persistant : les modèles Argos sont re-téléchargés à chaque
  # création de container. Cause : un volume nommé est root-owned alors que
  # LT tourne sous UID 1032 → PermissionError. Le re-download (~5-10 min,
  # ~1,3 Go pour 10 langues) ne se déclenche qu'aux redéploiements Dokploy,
  # pas aux simples restarts. À durcir plus tard via bind-mount chowné si le
  # temps de deploy devient gênant.
  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: "en,fr,es,de,pt,it,zh,ja,ko,ar"
      LT_DISABLE_WEB_UI: "true"
    # python3 plutôt que wget : l'image LT (python-slim) ne ship pas wget
    # mais a forcément python. start_period long car le boot télécharge les
    # modèles Argos.
    healthcheck:
      test:
        - CMD-SHELL
        - "python3 -c 'import urllib.request,sys; sys.exit(0) if urllib.request.urlopen(\"http://localhost:5000/languages\", timeout=3).getcode()==200 else sys.exit(1)' || exit 1"
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 600s
    networks:
      - dokploy-network

  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    environment:
      Java_Xms: "256m"
      Java_Xmx: "1g"
    networks:
      - dokploy-network

  face-matcher:
    build:
      context: ./infra/face-matcher
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5001
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  redis_data:
