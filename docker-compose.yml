# Compose minimal pour Dokploy.
# Pas de labels Traefik : la config domain/port se fait via l'UI Dokploy
# (Service → Domains), Dokploy ajoute lui-même les bons labels en sachant
# comment son Traefik est branché.
#
# À configurer dans l'UI :
#   frontend → jolyne.ralys.ovh       → container port 3000
#   backend  → api.jolyne.ralys.ovh   → container port 8080

name: jolyne

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JOLYNE_ENV: prod
      JOLYNE_PORT: 8080
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      # Postgres (Phase 2+). Renseigne dans Dokploy → Environment Variables.
      # Le DSN doit pointer vers le service Postgres interne (dokploy-network).
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      POSTGRES_AUTO_MIGRATE: ${POSTGRES_AUTO_MIGRATE:-false}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dokploy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_HTTP_URL: https://api.${JOLYNE_DOMAIN}
        NEXT_PUBLIC_BACKEND_WS_URL: wss://api.${JOLYNE_DOMAIN}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - dokploy-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "900 1",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  redis_data:
