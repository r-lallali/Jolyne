run:
  timeout: 3m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gosec
    - revive
    - bodyclose
    - contextcheck
    - errorlint
    - noctx
    - rowserrcheck
    - sqlclosecheck

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
